# KafkaTransferTool 完整配置示例
# 所有运行参数均在此文件配置；命令行仅选择 send / receive 与配置路径。
#
# 用法:
#   cp config.example.yaml config.yaml
#   python -m kafka_file_transfer -c config.yaml send
#   python -m kafka_file_transfer -c config.yaml receive
#   python -m kafka_file_transfer --version

# 配置文件版本（建议与程序版本一致，不一致时会打 warning）
version: "1.0.0"

kafka:
  brokers: "localhost:9092"
  topic: "file-transfer"
  # Producer 确认级别：all / 1 / 0
  acks: all
  retries: 3
  # 单次发送等待超时（秒）
  send_timeout: 60
  # Consumer poll 超时（毫秒）
  poll_timeout_ms: 1000
  # 可选：覆盖 Producer max.request.size；默认按 chunk_size 自动估算
  # max_request_size: 2097152
  # 可选：透传给 kafka-python 的额外参数
  # producer_extra: {}
  # consumer_extra: {}

transfer:
  # 分片大小（字节），建议小于 Kafka message.max.bytes（默认约 1MB）
  chunk_size: 524288

# 发送模式所需
send:
  file: "./examples/sample-data/sample.zip"

# 接收模式所需
receive:
  output_dir: "./received"
  group_id: "kafka-file-transfer-receiver"
  # 空闲超时（秒）：无新消息超过该时间则退出；0 表示持续监听
  idle_timeout: 30
  # 最多接收文件数；null 表示不限制
  max_files: null
  # earliest: 从最早消息开始；latest: 只消费启动后的新消息
  auto_offset_reset: earliest

logging:
  level: INFO          # DEBUG / INFO / WARNING / ERROR / CRITICAL
  format: "%(asctime)s [%(levelname)s] [%(name)s] %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  console: true
  # 日志文件路径；设为 null 或空字符串可关闭文件日志
  file: "./logs/kafka-file-transfer.log"
  max_bytes: 10485760  # 单文件最大 10MB，超出轮转
  backup_count: 5
  # 降低第三方库日志噪音
  quiet_loggers:
    - kafka
    - urllib3
